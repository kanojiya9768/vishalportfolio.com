<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible"
        content="IE=edge">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
        href="css/register.css">
    <link rel="stylesheet" href="css/status.css">
    <title>Registeration page</title>
</head>

<body>

    <div id="status"></div>

    <div class="container">

        <p id="redirect"
            style="margin-bottom:10px; display: none;">
            wait for 10 sec...u will be
            re-directed
            to login page</p>

        <p id="activation_msg"
            style="display:none;">after 1 hour U
            will be able to Login....Thanks You..!
        </p>


        <div class="alert" id="alert_box"
            style="font-size:20px;display:flex; justify-content: center; align-items: center; margin-bottom: 20px; flex-wrap: wrap;">
            <span id="alert_msg"
                style=" background-color:rgb(0, 255, 68); padding: 5px; border-radius: 5px; margin-right: 6px; margin-top: 10px;">Registered
                successfully</span>
        </div>

        <form id="register_form">
            <div class="head">
                <h1 id="register">Register</h1>
            </div>

            <div class="form_item">

                <div class="f_name">
                    <input type="text"
                        name="f_name" id="f_Name"
                        placeholder="Full Name"
                        required>
                </div>

                <div class="user_mail">
                    <input type="email"
                        name="user_mail"
                        id="user_mail"
                        placeholder="Enter Email"
                        required>
                </div>

                <div class="User">
                    <input type="text" name="User"
                        id="User_Name"
                        placeholder="Enter UserName"
                        required>
                </div>
                <div class="pass">
                    <input type="password"
                        name="password"
                        id="password"
                        placeholder="Enter pass"
                        required>
                </div>

                <div class="btn">
                    <input type="submit"
                        id="submit"
                        value="REGISTER">
                    <!-- <button type="submit" id="submit">Submit</button> -->
                </div>
            </div>
        </form>
    </div>



    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/firebase/7.14.1-0/firebase.js"></script>
    <script src="register.js"></script>

    <script>
        document.getElementById('alert_box').style.display = 'none';
    </script>


    <script src="on_off.js"></script>

</body>

</html>
